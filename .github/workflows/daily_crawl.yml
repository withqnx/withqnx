name: 매일 후기 크롤링 & Cloudflare 배포

on:
  schedule:
    - cron: '17 23 * * *'  # 매일 08:17 KST (UTC+9) — 정시 혼잡 회피
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # data.json 커밋 권한

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 코드 체크아웃 ──────────────────────────────
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 환경 ────────────────────────────────
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 anthropic python-dotenv

      # ── 3. 크롤링 ─────────────────────────────────────
      - name: 새 후기 크롤링 & AI 분류
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python crawl.py

      # ── 4. 대시보드 빌드 ──────────────────────────────
      - name: 대시보드 HTML 빌드
        run: python deploy_nas.py

      # ── 5. Cloudflare Pages 배포 ──────────────────────
      - name: Cloudflare Pages 배포
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT: ${{ secrets.CF_PROJECT }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️  CF_API_TOKEN 미설정 — Cloudflare 배포 건너뜀"
            exit 0
          fi
          mkdir -p .cf_deploy
          cp "겸손몰 후기 분석.html" .cf_deploy/index.html
          npx wrangler@3 pages deploy .cf_deploy \
            --project-name="$CF_PROJECT" \
            --commit-dirty=true \
            --branch=main
          echo "✅ 배포 완료: https://$CF_PROJECT.pages.dev"

      # ── 6. 업데이트된 data.json 커밋 ─────────────────
      - name: data.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json groups.json
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Daily crawl $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "새 후기 없음 — 커밋 생략"
          fi
